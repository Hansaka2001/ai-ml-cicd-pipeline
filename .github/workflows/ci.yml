# =============================================================================
# ci.yml
# GitHub Actions — Full CI/CD Pipeline
#
# Trigger: push or pull request to `main`.
#
# Job dependency graph:
#
#   ┌──────────┐     ┌──────────┐
#   │   lint   │     │   test   │
#   │ (Black)  │     │ (pytest) │
#   │ (Ruff)   │     │          │
#   └────┬─────┘     └────┬─────┘
#        │                │
#        └──── both ──────┘
#                  │
#                  ▼
#          ┌───────────────┐
#          │  docker-build │  ← builds image, runs smoke test, pushes to GHCR
#          │               │    (push to main only; PRs skip the push step)
#          └───────┬───────┘
#                  │  (push to main only)
#                  ▼
#          ┌───────────────┐
#          │    deploy     │  ← triggers Render deploy hook
#          └───────────────┘
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   RENDER_DEPLOY_HOOK_URL — Render.com deploy hook URL for your service.
#                            Leave unset to skip the deploy job entirely.
#
# Optional GitHub Secrets (for pushing to GHCR):
#   GITHUB_TOKEN is provided automatically by GitHub Actions — no setup needed.
# =============================================================================

name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
# Avoids wasting runner minutes on stale runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Shared shell default.
# ---------------------------------------------------------------------------
defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Centralised variables — change once, applies everywhere.
# ---------------------------------------------------------------------------
env:
  PYTHON_VERSION: "3.12"
  # Docker image name on GitHub Container Registry (ghcr.io).
  # Format: ghcr.io/<github-username>/<repo-name>
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sentiment-api

jobs:
  # ===========================================================================
  # JOB 1 — lint
  # Fast job: installs only the quality tools, not the heavy ML stack.
  # ===========================================================================
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Cache is shared with the test job via the same key.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-

      # Install only quality tools — fast, no ML deps.
      - name: Install quality tools
        run: pip install --no-cache-dir black ruff

      # --check exits non-zero if any file needs reformatting.
      # --diff shows what Black would change, making the failure easy to fix.
      - name: Check formatting with Black
        run: black . --check --diff

      # Rule sets and ignores are configured in pyproject.toml.
      - name: Lint with Ruff
        run: ruff check .

  # ===========================================================================
  # JOB 2 — test
  # Full pytest suite. Starts only after lint passes.
  # ===========================================================================
  test:
    name: "Unit Tests (pytest)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # --junitxml produces a machine-readable report consumed in the next step.
      # Live model tests are auto-skipped (model artifacts not present in CI).
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=reports/pytest-results.xml

      # Upload report even if tests fail so the failure is always diagnosable.
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/pytest-results.xml
          retention-days: 14

  # ===========================================================================
  # JOB 3 — docker-build
  # Builds the Docker image and runs a smoke test against the running container.
  # On pushes to main, the image is tagged and pushed to GitHub Container
  # Registry (GHCR). Pull-request runs build-and-test only (no push).
  # ===========================================================================
  docker-build:
    name: "Docker Build & Smoke Test"
    runs-on: ubuntu-latest
    needs: [lint, test]  # only build when both quality gates pass

    # Permissions required to push to GHCR.
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Docker build cache via GitHub Actions cache backend.
      # Dramatically reduces rebuild times when only app code changes.
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Log in to GitHub Container Registry.
      # GITHUB_TOKEN is provided automatically — no secret configuration needed.
      # Login is skipped on pull requests (we don't push images from PRs).
      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Generate Docker image tags:
      #   - `latest`  on every push to main
      #   - `sha-<short-commit-hash>`  for precise rollback targeting
      # -----------------------------------------------------------------------
      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short

      # -----------------------------------------------------------------------
      # Build the Docker image.
      # NOTE: The model artifacts (training/model/*.joblib) must be committed
      # to the repository for the COPY step in the Dockerfile to succeed.
      # If the model directory is empty, the API starts but returns HTTP 503
      # on POST /predict — the smoke test below only checks GET /.
      # -----------------------------------------------------------------------
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false          # load locally for smoke test first
          load: true
          tags: sentiment-api:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Smoke test: start the container and verify GET / returns HTTP 200.
      # Steps:
      #   1. Start container in the background (detached).
      #   2. Wait up to 30 s for it to become ready.
      #   3. Hit GET / and assert status 200.
      #   4. Tear down the container.
      # -----------------------------------------------------------------------
      - name: Smoke test — container health check
        run: |
          echo "Starting container..."
          docker run -d --name sentiment-test -p 8000:8000 sentiment-api:ci

          echo "Waiting for API to become ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is up (attempt $i) — status $STATUS"
              break
            fi
            echo "  Attempt $i — got $STATUS, retrying in 1s..."
            sleep 1
            if [ "$i" = "30" ]; then
              echo "❌ API did not become ready in 30 seconds"
              docker logs sentiment-test
              docker rm -f sentiment-test
              exit 1
            fi
          done

          echo "Testing GET / endpoint..."
          RESPONSE=$(curl -s http://localhost:8000/)
          echo "Response: $RESPONSE"

          # Validate response contains the expected keys.
          echo "$RESPONSE" | python3 -c "
          import json, sys
          body = json.load(sys.stdin)
          assert 'message' in body, 'Missing key: message'
          assert 'version' in body, 'Missing key: version'
          assert 'docs_url' in body, 'Missing key: docs_url'
          print('✅ Response schema is valid.')
          "

          docker rm -f sentiment-test

      # -----------------------------------------------------------------------
      # Push to GHCR — only on direct pushes to main (not on PRs).
      # This creates the `latest` and `sha-*` tags used by the deploy job.
      # -----------------------------------------------------------------------
      - name: Push image to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # JOB 4 — deploy
  # Triggers a Render.com deployment after a successful Docker push.
  # Only runs on pushes to main (not on pull requests).
  #
  # Setup:
  #   1. Go to your Render service → Settings → Deploy Hooks.
  #   2. Copy the deploy hook URL.
  #   3. Add it as a GitHub secret: Settings → Secrets → Actions →
  #      New repository secret → Name: RENDER_DEPLOY_HOOK_URL
  #   4. On Railway or other platforms, replace the curl step with their CLI.
  # ===========================================================================
  deploy:
    name: "Deploy to Render"
    runs-on: ubuntu-latest
    needs: docker-build
    # Only deploy on real pushes to main — never on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # `environment: production` enables manual approval gates and shows
    # the deployment in the GitHub Environments dashboard.
    environment: production

    steps:
      # -----------------------------------------------------------------------
      # Single step handles both cases:
      #   - Secret is set   → POST to Render deploy hook and check response.
      #   - Secret not set  → print instructions and exit 0 (no failure).
      #
      # NOTE: Secrets cannot be referenced in `if:` conditions (GitHub Actions
      # limitation). The check is done inside the bash script via an env var.
      # -----------------------------------------------------------------------
      - name: Trigger Render deploy hook
        env:
          # Expose the secret as an environment variable so the shell script
          # can read it. This is the only safe way to access secrets in steps.
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret is not configured."
            echo "    To enable deployment:"
            echo "      1. Go to your Render service → Settings → Deploy Hooks"
            echo "      2. Copy the URL"
            echo "      3. Add it as a GitHub secret:"
            echo "         Repo → Settings → Secrets → Actions → New secret"
            echo "         Name: RENDER_DEPLOY_HOOK_URL"
            echo "    Skipping deployment for now."
            exit 0
          fi

          echo "Triggering deployment on Render..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")

          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
            echo "✅ Deployment triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "❌ Deploy hook returned HTTP $HTTP_STATUS"
            exit 1
          fi
