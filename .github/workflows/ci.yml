# =============================================================================
# ci.yml
# GitHub Actions — Production-Grade Multi-Stage CI Pipeline
#
# Trigger: push or pull request to `main`.
#
# Job graph:
#
#   ┌─────────┐     ┌──────┐
#   │  lint   │     │ test │
#   │ (Black) │     │      │
#   │ (Ruff)  │     │pytest│
#   └────┬────┘     └──┬───┘
#        │             │
#        └──── both must pass for PR merge ────┘
#
# Jobs run in PARALLEL by default.
# The `test` job has `needs: lint` so tests only run when lint passes —
# avoids wasting runner minutes on test runs with known formatting errors.
#
# Future extension points (CD phases):
#   - Add a `docker-build` job after `test` to build and push an image.
#   - Add a `deploy-staging` job after `docker-build`.
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ---------------------------------------------------------------------------
# Shared defaults applied to every job step that runs a shell command.
# ---------------------------------------------------------------------------
defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Environment variables available to all jobs.
# Centralised here so they are easy to update in future phases.
# ---------------------------------------------------------------------------
env:
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # JOB 1 — lint
  # Checks code formatting (Black) and linting rules (Ruff).
  # Fast job: no ML dependencies needed, so only quality tools are installed.
  # ===========================================================================
  lint:
    name: "Lint & Format Check"
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1a. Check out the repository.
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1b. Set up the project Python version.
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -----------------------------------------------------------------------
      # 1c. Cache pip downloads.
      #     Key: OS + Python version + hash of requirements.txt.
      #     The cache is automatically invalidated when any dependency changes.
      # -----------------------------------------------------------------------
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-

      # -----------------------------------------------------------------------
      # 1d. Install only the quality tools (fast, no heavy ML deps).
      # -----------------------------------------------------------------------
      - name: Install quality tools
        run: pip install --no-cache-dir black ruff

      # -----------------------------------------------------------------------
      # 1e. Black — check formatting without modifying files.
      #     --diff shows exactly what would change, making failures easy to fix.
      # -----------------------------------------------------------------------
      - name: Check formatting with Black
        run: black . --check --diff

      # -----------------------------------------------------------------------
      # 1f. Ruff — lint for errors, unused imports, style violations, etc.
      #     Rule sets and ignores are configured in pyproject.toml.
      # -----------------------------------------------------------------------
      - name: Lint with Ruff
        run: ruff check .

  # ===========================================================================
  # JOB 2 — test
  # Runs the full pytest suite.
  # Only starts after `lint` succeeds (needs: lint) to avoid burning
  # runner minutes on test runs when formatting is already broken.
  # ===========================================================================
  test:
    name: "Unit Tests (pytest)"
    runs-on: ubuntu-latest
    needs: lint  # waits for lint to pass before starting

    steps:
      # -----------------------------------------------------------------------
      # 2a. Check out the repository.
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2b. Set up Python.
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # -----------------------------------------------------------------------
      # 2c. Cache pip downloads (same cache key as lint job — shared cache).
      # -----------------------------------------------------------------------
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-py${{ env.PYTHON_VERSION }}-pip-

      # -----------------------------------------------------------------------
      # 2d. Install all project dependencies (including ML libs for tests).
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      # -----------------------------------------------------------------------
      # 2e. Run pytest.
      #     --tb=short       — concise tracebacks on failure.
      #     --junitxml       — produce a JUnit XML report consumed in step 2f.
      #     Live model tests (@pytest.mark.skipif) are skipped automatically
      #     because training artifacts are not present in CI.
      # -----------------------------------------------------------------------
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=reports/pytest-results.xml

      # -----------------------------------------------------------------------
      # 2f. Upload test report as a workflow artifact.
      #     Visible in the GitHub Actions run summary under "Artifacts".
      #     Useful for debugging failures without re-running locally.
      #     `if: always()` ensures the report is uploaded even when tests fail.
      # -----------------------------------------------------------------------
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/pytest-results.xml
          retention-days: 14  # keep for 2 weeks, then auto-delete

  # ===========================================================================
  # FUTURE PHASE PLACEHOLDER — Docker Build & CD
  #
  # Uncomment and fill in when ready for deployment.
  #
  # docker-build:
